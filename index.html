<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Scanner Table</title>

    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }
        #reader {
            width: 300px;
            margin: auto;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
        th {
            background: #333;
            color: white;
        }
        button {
            padding: 10px 20px;
            margin-top: 15px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>QR Code Scanner</h2>

<div id="reader"></div>

<h3>Scanned Data</h3>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Item Name</th>
            <th>Price</th>
            <th>Purchase Date</th>
            <th>Disposal Date</th>
            <th>Room No</th>
            <th>Owner</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<!-- Download Button -->
<button onclick="downloadExcel()">Download Excel</button>

<script>

let allData = []; // 👉 data store

function onScanSuccess(decodedText) {

    let lines = decodedText.split("\n");

    let data = {
        id: lines[0],
        item: lines[1]?.replace("ITEM NAME: ", ""),
        price: lines[2]?.replace("PRICE: ", ""),
        purchase: lines[3]?.replace("PURCHAGE DATE: ", ""),
        disposal: lines[4]?.replace("DISPOSSAL DATE: ", ""),
        room: lines[5]?.replace("ROOM NO.: ", ""),
        owner: lines[6]?.replace("OWENER: ", "")
    };

    // 👉 duplicate check (optional but useful)
    if (allData.some(d => d.id === data.id)) {
        alert("Already scanned!");
        return;
    }

    allData.push(data);

    let row = `
        <tr>
            <td>${data.id}</td>
            <td>${data.item}</td>
            <td>${data.price}</td>
            <td>${data.purchase}</td>
            <td>${data.disposal}</td>
            <td>${data.room}</td>
            <td>${data.owner}</td>
        </tr>
    `;

    document.getElementById("tableBody").innerHTML += row;
}

// 👉 Excel Download Function
function downloadExcel() {

    let csv = "ID,Item Name,Price,Purchase Date,Disposal Date,Room No,Owner\n";

    allData.forEach(d => {
        csv += `${d.id},${d.item},${d.price},${d.purchase},${d.disposal},${d.room},${d.owner}\n`;
    });

    let blob = new Blob([csv], { type: "text/csv" });
    let url = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "QR_Data.csv";
    a.click();
}

// Scanner Start
let scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
});

scanner.render(onScanSuccess);

</script>

</body>
</html>
