<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>POST Request</title>
</head>
<body>

<button onclick="sendRequest()">Send POST Request</button>

<script>
function sendRequest() {
    fetch("https://patrika.xo.je/notification.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "amount=100&upi_id=test@upi&id=123"
    })
    .then(response => response.text())
    .then(data => {
        alert("Response: " + data);
    })
    .catch(error => {
        alert("Error: " + error);
    });
}
</script>

</body>
</html>
