<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Custom QR Scanner</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #f4f4f4;
    }
    video {
        width: 300px;
        border: 2px solid black;
    }
    table {
        margin: 20px auto;
        border-collapse: collapse;
        width: 80%;
        background: white;
    }
    th, td {
        border: 1px solid black;
        padding: 10px;
    }
    th {
        background: #333;
        color: white;
    }
</style>
</head>

<body>

<h2>QR Code Scanner (No Library)</h2>

<video id="video" autoplay></video>

<h3>Scanned Data</h3>

<table>
<thead>
<tr>
    <th>ID</th>
    <th>Item Name</th>
    <th>Price</th>
    <th>Purchase Date</th>
    <th>Disposal Date</th>
    <th>Room No</th>
    <th>Owner</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>
const video = document.getElementById('video');

// Camera start
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    alert("Camera access error: " + err);
});

// QR detect function
const detector = new BarcodeDetector({ formats: ['qr_code'] });

async function scanQR() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        try {
            const barcodes = await detector.detect(video);

            if (barcodes.length > 0) {
                let decodedText = barcodes[0].rawValue;
                console.log(decodedText);
                addToTable(decodedText);
            }
        } catch (err) {
            console.log(err);
        }
    }
    requestAnimationFrame(scanQR);
}

function addToTable(decodedText) {
    let lines = decodedText.split("\n");

    let data = {
        id: lines[0],
        item: lines[1]?.replace("ITEM NAME: ", ""),
        price: lines[2]?.replace("PRICE: ", ""),
        purchase: lines[3]?.replace("PURCHAGE DATE: ", ""),
        disposal: lines[4]?.replace("DISPOSSAL DATE: ", ""),
        room: lines[5]?.replace("ROOM NO.: ", ""),
        owner: lines[6]?.replace("OWENER: ", "")
    };

    let row = `
        <tr>
            <td>${data.id}</td>
            <td>${data.item}</td>
            <td>${data.price}</td>
            <td>${data.purchase}</td>
            <td>${data.disposal}</td>
            <td>${data.room}</td>
            <td>${data.owner}</td>
        </tr>
    `;

    document.getElementById("tableBody").innerHTML += row;
}

// start scanning
scanQR();
</script>

</body>
</html>
